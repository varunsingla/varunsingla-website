  <style>
    /* ── Reset & Base ─────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #07070f;
      --surface:   #0d0d1c;
      --surface2:  #111127;
      --border:    rgba(255,255,255,0.07);
      --border-h:  rgba(124,58,237,0.35);
      --p1: #7c3aed;
      --p2: #2563eb;
      --p3: #06b6d4;
      --text:      #eeeeff;
      --muted:     #8888aa;
      --dim:       #44445a;
      --green:     #10b981;
      --yellow:    #f59e0b;
      --red:       #ef4444;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.65;
      overflow-x: hidden;
    }

    /* ── Ambient background glow ─────────────────── */
    .ambient {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background:
        radial-gradient(ellipse 60% 50% at 15% 10%, rgba(124,58,237,.10) 0%, transparent 60%),
        radial-gradient(ellipse 50% 60% at 85% 85%, rgba(37,99,235,.10) 0%, transparent 60%),
        radial-gradient(ellipse 40% 40% at 50% 50%, rgba(6,182,212,.04) 0%, transparent 70%);
    }

    /* ── Scrollbar ───────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--p1); border-radius: 3px; }

    /* ── Wrapper ─────────────────────────────────── */
    .wrap { max-width: 860px; margin: 0 auto; padding: 0 24px; position: relative; z-index: 1; }

    /* ── Header ──────────────────────────────────── */
    header {
      padding: 72px 24px 48px;
      text-align: center;
      position: relative; z-index: 1;
      max-width: 860px;
      margin: 0 auto;
    }

    .live-badge {
      display: inline-flex; align-items: center; gap: 7px;
      background: rgba(124,58,237,.12);
      border: 1px solid rgba(124,58,237,.30);
      color: #b39dff;
      padding: 6px 16px;
      border-radius: 100px;
      font-size: 11.5px; font-weight: 700;
      letter-spacing: .07em; text-transform: uppercase;
      margin-bottom: 24px;
    }

    .live-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #7c3aed;
      animation: blink 2s ease-in-out infinite;
    }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }

    h1 {
      font-size: clamp(30px, 5.5vw, 58px);
      font-weight: 800;
      letter-spacing: -.035em;
      line-height: 1.1;
      background: linear-gradient(130deg, #f0f0ff 0%, #c4b5fd 40%, #93c5fd 80%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 14px;
    }

    .hero-sub {
      font-size: 16px;
      color: var(--muted);
      max-width: 480px;
      margin: 0 auto 40px;
    }

    /* ── Stats bar ───────────────────────────────── */
    .stats-bar {
      display: flex; justify-content: center; gap: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      max-width: 640px;
      margin: 0 auto 72px;
      overflow: hidden;
    }

    .stat-item {
      flex: 1;
      text-align: center;
      padding: 20px 16px;
      border-right: 1px solid var(--border);
    }
    .stat-item:last-child { border-right: none; }

    .stat-num {
      font-size: 30px; font-weight: 800;
      background: linear-gradient(135deg, var(--p1), var(--p2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      margin-bottom: 4px;
    }

    .stat-label {
      font-size: 11px; color: var(--dim);
      text-transform: uppercase; letter-spacing: .07em;
      font-weight: 600;
    }

    /* ── Section label ───────────────────────────── */
    .section-label {
      font-size: 11px; font-weight: 700;
      color: var(--dim);
      text-transform: uppercase; letter-spacing: .12em;
      margin-bottom: 28px;
      display: flex; align-items: center; gap: 14px;
    }

    .section-label::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }

    /* ── Learning cards ──────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 28px 32px;
      margin-bottom: 16px;
      transition: border-color .25s, transform .2s, box-shadow .25s;
    }

    .card:not(.latest) {
      cursor: pointer;
    }

    .card:hover {
      border-color: var(--border-h);
      transform: translateY(-2px);
      box-shadow: 0 8px 40px rgba(124,58,237,.08);
    }

    /* Latest card highlight */
    .card.latest {
      background: linear-gradient(145deg, rgba(124,58,237,.09) 0%, rgba(37,99,235,.05) 100%);
      border-color: rgba(124,58,237,.22);
      position: relative; overflow: hidden;
    }

    .card.latest::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, #7c3aed, #2563eb, #06b6d4);
    }

    /* Card header row — always visible */
    .card-header {
      display: flex; justify-content: space-between; align-items: center;
      gap: 12px; cursor: pointer; user-select: none;
    }

    .card-header-left { flex: 1; min-width: 0; }

    /* Card top row (date + badge) */
    .card-top {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 5px; flex-wrap: wrap;
    }

    .card-date {
      font-size: 11.5px; font-weight: 700;
      color: var(--dim); letter-spacing: .07em; text-transform: uppercase;
    }

    .tag-latest {
      background: linear-gradient(135deg, #7c3aed, #2563eb);
      color: white; font-size: 10px; font-weight: 700;
      padding: 3px 10px; border-radius: 100px;
      letter-spacing: .06em; text-transform: uppercase;
    }

    .card-title {
      font-size: 20px; font-weight: 750; letter-spacing: -.02em;
      color: var(--text); line-height: 1.3;
    }

    /* Chevron */
    .card-chevron {
      flex-shrink: 0;
      width: 28px; height: 28px;
      border-radius: 50%;
      background: rgba(255,255,255,.05);
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; color: var(--dim);
      transition: transform .25s ease, background .2s, color .2s;
    }

    .card.open .card-chevron {
      transform: rotate(180deg);
      background: rgba(124,58,237,.12);
      color: #a78bfa;
      border-color: rgba(124,58,237,.25);
    }

    /* Card body — collapsible */
    .card-body {
      display: none;
      margin-top: 20px;
    }

    .card-body.open {
      display: block;
    }

    /* ── Viral App pill ──────────────────────────── */
    .viral-block {
      display: flex; align-items: flex-start; gap: 14px;
      background: rgba(245,158,11,.07);
      border: 1px solid rgba(245,158,11,.20);
      border-radius: 14px;
      padding: 14px 18px;
      margin-bottom: 22px;
    }

    .viral-fire { font-size: 22px; flex-shrink: 0; line-height: 1; margin-top: 2px; }

    .viral-tag {
      font-size: 10px; font-weight: 800; color: #f59e0b;
      text-transform: uppercase; letter-spacing: .09em; margin-bottom: 2px;
    }

    .viral-name {
      font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 3px;
    }

    .viral-desc {
      font-size: 13px; color: var(--muted); line-height: 1.5;
    }

    /* ── Topics accordion ────────────────────────── */
    .topics-toggle {
      display: flex; align-items: center; gap: 7px;
      font-size: 13px; font-weight: 650; color: #a78bfa;
      cursor: pointer; border: none; background: none;
      padding: 0; margin-bottom: 14px;
      transition: color .2s;
    }

    .topics-toggle:hover { color: #c4b5fd; }

    .toggle-arrow {
      display: inline-block; font-size: 10px;
      transition: transform .22s ease;
    }

    .topics-toggle.open .toggle-arrow { transform: rotate(90deg); }

    .topics-list {
      display: none; list-style: none;
      margin-bottom: 18px;
    }

    .topics-list.open { display: block; }

    /* Divider between collapsed cards */
    .card:not(.latest):not(.open) .card-header {
      padding-bottom: 0;
    }

    .topics-list li {
      font-size: 14px; color: var(--muted);
      padding: 9px 0 9px 18px;
      border-left: 2px solid rgba(124,58,237,.28);
      margin-bottom: 6px;
      line-height: 1.55;
    }

    .topics-list li strong { color: #d4c0ff; font-weight: 650; }

    /* ── Key stats chips ─────────────────────────── */
    .chips {
      display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 18px;
    }

    .chip {
      background: rgba(6,182,212,.08);
      border: 1px solid rgba(6,182,212,.18);
      color: #67e8f9;
      font-size: 12px; font-weight: 500;
      padding: 6px 12px; border-radius: 8px;
      line-height: 1.4;
    }

    /* ── Tomorrow preview ────────────────────────── */
    .next-up {
      display: flex; align-items: flex-start; gap: 10px;
      background: rgba(16,185,129,.06);
      border: 1px solid rgba(16,185,129,.16);
      border-radius: 11px;
      padding: 12px 16px;
      font-size: 13.5px;
    }

    .next-label {
      color: #10b981; font-weight: 750;
      white-space: nowrap; margin-top: 1px;
    }

    .next-text { color: var(--muted); line-height: 1.5; }

    /* ── Empty state ─────────────────────────────── */
    .empty {
      text-align: center; padding: 80px 24px;
      color: var(--dim);
    }

    /* ── Footer ──────────────────────────────────── */
    footer {
      position: relative; z-index: 1;
      text-align: center;
      padding: 40px 24px 60px;
      border-top: 1px solid var(--border);
      color: var(--dim);

    .footer-logo {
      font-size: 20px; font-weight: 800;
      background: linear-gradient(130deg, var(--p1), var(--p2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;

      margin-bottom: 8px;

    /* ── Focus intro ─────────────────────────────── */
    .focus-intro {

      margin-bottom: 22px;
      padding: 14px 18px;
      background: rgba(124,58,237,.06);
      border-left: 3px solid rgba(124,58,237,.35);
      border-radius: 0 10px 10px 0;
    }

    /* ── Rich sections ───────────────────────────── */
    .section {
      margin-bottom: 22px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }
    .section:last-of-type { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }

    .section-heading {
      font-size: 13.5px; font-weight: 750; color: #c4b5fd;
      letter-spacing: .02em; margin-bottom: 10px;
      text-transform: uppercase;
    }

    .section-para {
      font-size: 14px; color: var(--muted); line-height: 1.65;
      margin-bottom: 10px;
    }

    .section-bullets {
      list-style: none; margin-bottom: 10px;
    }

    .section-bullets li {
      font-size: 13.5px; color: var(--muted); line-height: 1.6;
      padding: 5px 0 5px 18px;
      position: relative;
    }

    .section-bullets li::before {
      content: '›';
      position: absolute; left: 4px; top: 5px;
      color: var(--p1); font-size: 13px; font-weight: 700;
    }

    .section-highlight {
      font-size: 13px; color: #fbbf24; font-style: italic;
      background: rgba(245,158,11,.06);
      border: 1px solid rgba(245,158,11,.14);
      border-radius: 8px; padding: 10px 14px;
      margin-top: 10px; line-height: 1.55;
    }

    /* ── Data table ──────────────────────────────── */
    .table-wrap { overflow-x: auto; margin: 10px 0; }

    .data-table {
      width: 100%; border-collapse: collapse;
      font-size: 12.5px;
    }

    .data-table th {
      background: rgba(124,58,237,.12);
      color: #c4b5fd;
      padding: 8px 12px; text-align: left;
      font-weight: 700; letter-spacing: .04em; text-transform: uppercase;
      font-size: 11px;
      border-bottom: 1px solid rgba(124,58,237,.20);
    }

    .data-table td {
      padding: 8px 12px; color: var(--muted);
      border-bottom: 1px solid var(--border);
      vertical-align: top; line-height: 1.5;
    }

    .data-table tr:last-child td { border-bottom: none; }
    .data-table tr:hover td { background: rgba(255,255,255,.02); }

    /* ── Market signal ───────────────────────────── */
    .market-signal {
      display: flex; align-items: flex-start; gap: 12px;
      background: rgba(37,99,235,.07);
      border: 1px solid rgba(37,99,235,.18);
      border-radius: 12px;

    .market-signal-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
    .market-signal-label {
      font-size: 10px; font-weight: 800; color: #60a5fa;
      text-transform: uppercase; letter-spacing: .09em; margin-bottom: 3px;

    /* ── Practical takeaway ──────────────────────── */
    .takeaway {
      display: flex; align-items: flex-start; gap: 12px;
      background: rgba(16,185,129,.06);
      border: 1px solid rgba(16,185,129,.16);
      border-radius: 12px;
      padding: 14px 16px; margin-bottom: 18px;
      font-size: 13.5px; color: var(--muted); line-height: 1.55;
    }

    .takeaway-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
    .takeaway-label {
      font-size: 10px; font-weight: 800; color: #34d399;
      text-transform: uppercase; letter-spacing: .09em; margin-bottom: 3px;
    }

    /* ── Responsive ──────────────────────────────── */
    @media (max-width: 580px) {
      header { padding: 48px 16px 36px; }
      .stats-bar { flex-direction: column; }
      .stat-item { border-right: none; border-bottom: 1px solid var(--border); }
      .stat-item:last-child { border-bottom: none; }
      .card { padding: 22px; }
      .card-title { font-size: 18px; }
    }
  </style>
</head>

  <script>
    async function init() {
      let data;
      try {
        const res = await fetch('learnings.json?v=' + Date.now());
        data = await res.json();
      } catch (e) {
        document.getElementById('feed').innerHTML =
          '<div class="empty">⚠️ Could not load learnings. Please check back soon.</div>';
        return;
      }
      renderStats(data.learnings);
      renderFeed(data.learnings);
      injectBlogPostingSchema(data.learnings);
    }

    /* ── Animated counter ── */
    function countUp(id, target) {
      const el = document.getElementById(id);
      let v = 0;
      const step = Math.max(1, Math.round(target / 25));
      const t = setInterval(() => {
        v = Math.min(v + step, target);
        el.textContent = v;
        if (v >= target) clearInterval(t);
      }, 45);
    }

    function renderStats(learnings) {
      const sections = learnings.reduce((n, l) => n + (l.sections || []).length, 0);
      const apps     = learnings.filter(l => l.viral_app).length;
      countUp('s-days',   learnings.length);
      countUp('s-topics', sections);
      countUp('s-apps',   apps);
    }

    function renderFeed(learnings) {
      const feed = document.getElementById('feed');
      feed.innerHTML = '';

      if (!learnings.length) {
        feed.innerHTML = '<div class="empty">No entries yet.</div>';
        return;
      }

      learnings.forEach((l, i) => {
        const isLatest = i === 0;
        const card = document.createElement('article');
        card.className = 'card' + (isLatest ? ' latest open' : '');
        card.innerHTML = buildCard(l, isLatest);
        // clicking collapsed cards toggles them open
        if (!isLatest) {
          card.addEventListener('click', function(e) {
            // don't re-toggle if clicking the inner topics-toggle button
            if (e.target.closest('.topics-toggle')) return;
            toggleCard(this);
          });
        }
        feed.appendChild(card);
      });
    }

    function buildSection(sec) {
      const heading = `<div class="section-heading">${esc(sec.title)}</div>`;

      const paras = (sec.paragraphs || []).map(p =>
        `<p class="section-para">${esc(p)}</p>`
      ).join('');

      const bullets = (sec.bullets || []).length
        ? `<ul class="section-bullets">${(sec.bullets).map(b => `<li>${esc(b)}</li>`).join('')}</ul>`
        : '';

      let tableHtml = '';
      if (sec.table && sec.table.headers && sec.table.rows) {
        const ths = sec.table.headers.map(h => `<th>${esc(h)}</th>`).join('');
        const trs = sec.table.rows.map(row =>
          `<tr>${row.map(cell => `<td>${esc(cell)}</td>`).join('')}</tr>`
        ).join('');
        tableHtml = `<div class="table-wrap"><table class="data-table"><thead><tr>${ths}</tr></thead><tbody>${trs}</tbody></table></div>`;
      }

      const highlight = sec.highlight
        ? `<div class="section-highlight">💡 ${esc(sec.highlight)}</div>`
        : '';

      return `<div class="section">${heading}${paras}${bullets}${tableHtml}${highlight}</div>`;
    }

    function buildCard(l, isLatest) {
      const viralHtml = l.viral_app ? `
        <div class="viral-block">
          <span class="viral-fire">🔥</span>
          <div>
            <div class="viral-tag">Viral App of the Day</div>
            <div class="viral-name">${esc(l.viral_app.name)}</div>
            <div class="viral-desc">${esc(l.viral_app.description)}</div>
          </div>
        </div>` : '';

      const focusHtml = l.focus_intro
        ? `<div class="focus-intro">${esc(l.focus_intro)}</div>`
        : '';

      const sectionsHtml = (l.sections || []).map(buildSection).join('');

      const marketHtml = l.market_signal ? `
        <div class="market-signal">
          <span class="market-signal-icon">📈</span>
          <div>
            <div class="market-signal-label">Market Signal</div>
            ${esc(l.market_signal)}
          </div>
        </div>` : '';

      const takeawayHtml = l.practical_takeaway ? `
        <div class="takeaway">
          <span class="takeaway-icon">🎯</span>
          <div>
            <div class="takeaway-label">Practical Takeaway</div>
            ${esc(l.practical_takeaway)}
          </div>
        </div>` : '';

      const chipsHtml = (l.key_stats || []).length
        ? `<div class="chips">${l.key_stats.map(s => `<span class="chip">📊 ${esc(s)}</span>`).join('')}</div>`
        : '';

      const nextHtml = l.tomorrow_preview
        ? `<div class="next-up">
            <span class="next-label">Next →</span>
            <span class="next-text">${esc(l.tomorrow_preview)}</span>
           </div>`
        : '';

      const chevron = isLatest ? '' : `<span class="card-chevron">▾</span>`;

      const sectionCount = (l.sections || []).length;
      const sectionCountBadge = sectionCount
        ? `<span style="font-size:11px;color:var(--dim);font-weight:600;">${sectionCount} sections</span>`
        : '';

      return `
        <div class="card-header">
          <div class="card-header-left">
            <div class="card-top">
              <span class="card-date">${esc(l.display_date)}</span>
              ${isLatest ? '<span class="tag-latest">✨ Latest</span>' : ''}
              ${!isLatest ? sectionCountBadge : ''}
            </div>
            <div class="card-title">${esc(l.title || 'Daily AI Learning')}</div>
          </div>
          ${chevron}
        </div>
        <div class="card-body${isLatest ? ' open' : ''}">
          ${viralHtml}
          ${focusHtml}
          ${sectionsHtml}
          ${chipsHtml}
          ${marketHtml}
          ${takeawayHtml}
          ${nextHtml}
        </div>
      `;
    }

    function toggleCard(card) {
      card.classList.toggle('open');
      card.querySelector('.card-body').classList.toggle('open');
    }

    function toggleTopics(e, btn) {
      e.stopPropagation(); // don't bubble up to card click
      btn.classList.toggle('open');
      btn.nextElementSibling.classList.toggle('open');
    }

    // keep old toggle for backward compat (not used now)
    function toggle(btn) {
      btn.classList.toggle('open');
      btn.nextElementSibling.classList.toggle('open');
    }

    function esc(str) {
      if (!str) return '';
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    init();
  </script>

  <!-- Dynamic: BlogPosting for each learning entry (injected by JS after load) -->
  <script id="ld-blogpostings" type="application/ld+json">[]</script>

  <script>
  // Called from init() after learnings are loaded — injects BlogPosting schema per entry
  function injectBlogPostingSchema(learnings) {
    const posts = learnings.map(l => ({
      "@type": "BlogPosting",
      "@context": "https://schema.org",
      "headline": l.title || ("AI Learning — " + l.display_date),
      "description": l.focus_intro || l.title || "Daily AI learning entry by Varun Singla.",
      "datePublished": l.date + "T21:00:00+08:00",
      "dateModified":  l.date + "T21:00:00+08:00",
      "author": { "@id": "https://www.varunsingla.com/#varun" },
      "publisher": { "@id": "https://www.varunsingla.com/#varun" },
      "mainEntityOfPage": { "@type": "WebPage", "@id": "https://www.varunsingla.com/#" + l.date },
      "url": "https://www.varunsingla.com/#" + l.date,
      "isPartOf": { "@id": "https://www.varunsingla.com/#blog" },
      "keywords": (l.sections || []).map(s => s.title).join(", "),
      "articleBody": [l.focus_intro, ...(l.sections || []).map(s =>
        [s.title, ...(s.paragraphs || []), ...(s.bullets || [])].join(" ")
      )].join(" ").slice(0, 2000)
    }));
    document.getElementById("ld-blogpostings").textContent = JSON.stringify(posts);
  }
  </script>
